name: Deploy to Firebase
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
# Required for keyless auth: id-token lets the job mint a GitHub OIDC token that
# Google's Workload Identity Federation exchanges for short-lived credentials.
permissions:
  contents: read
  id-token: write
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - run: npm run build
      - run: npm test
      # Cloud Function validator tests (separate package; its lockfile is
      # intentionally gitignored, so use `npm install` here, not `npm ci`).
      - name: Test Cloud Function
        run: |
          cd functions && npm ci
          cd test && npm install && npm test
      # Authenticate to Google Cloud via Workload Identity Federation (keyless).
      # Exports GOOGLE_APPLICATION_CREDENTIALS for firebase-tools to pick up.
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/760593328259/locations/global/workloadIdentityPools/github/providers/github-provider
          service_account: github-deploy@ballmeccaweb.iam.gserviceaccount.com
      # Hosting: preview channel on PRs, live channel on push to main.
      - name: Deploy Hosting (preview on PR)
        if: github.event_name == 'pull_request'
        run: npx --yes firebase-tools@13 hosting:channel:deploy "pr-${{ github.event.number }}" --project ballmeccaweb --expires 7d --non-interactive
      - name: Deploy Hosting (live on push)
        if: github.event_name == 'push'
        run: npx --yes firebase-tools@13 deploy --only hosting --project ballmeccaweb --non-interactive
      # Functions: deploy ONLY on push to main (the /api/submitForm rewrite
      # depends on this function).
      - name: Deploy Functions
        if: github.event_name == 'push'
        run: npx --yes firebase-tools@13 deploy --only functions --project ballmeccaweb --non-interactive
